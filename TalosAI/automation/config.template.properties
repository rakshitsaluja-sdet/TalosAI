# ============================================
# TalosAI - Configuration Template
# ============================================
# INSTRUCTIONS:
# 1. Copy this file to "config.properties" (same folder)
# 2. Fill in any values you want to override
# 3. NEVER commit config.properties to Git (it's in .gitignore)
#
# For CI/CD: use GitHub Secrets, or set AZURE_KEY_VAULT_URL to pull secrets
# from an Azure Key Vault instead (see SecureConfigManager.cs).
# ============================================

# UI target — saucedemo.com is a public e-commerce demo store
BaseUrl=https://www.saucedemo.com/

# Environment Configuration
Browser=EDGE
Headless=true

# API Configuration — reqres.in is a public mock REST API
ApiBaseUrl=https://reqres.in
ApiTimeout=60000
ApiToken=

# Database Configuration (optional — only needed if you point DatabaseToolHandler
# or a custom step at a real SQL Server instance)
# DatabaseConnectionString=Server=your-server;Database=your-db;User Id=your-user;Password=YourPassword;Encrypt=True;TrustServerCertificate=True;

# OAuth 2.0 Client Credentials (optional — only needed if a real API under test
# requires client-credentials auth; the demo APIs above don't)
# OAuthTokenUrl=
# OAuthClientId=
# OAuthClientSecret=
OAuthScope=openid

# ExtentReports Configuration
ExtentReportAutoOpen=false
